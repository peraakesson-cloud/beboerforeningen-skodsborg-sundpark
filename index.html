<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log ind — Beboerforeningen Skodsborg Sundpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  // Already authenticated this session? Skip straight to the landing page.
  if (sessionStorage.getItem("ssp-auth") === "ok") { location.replace("hjem.html"); }
</script>
<style>
  :root{
    --ink:#2a121f;
    --brand:#4b1938;
    --brand-soft:#6e2b51;
    --paper:#fcfbf9;
    --line:#e7e1da;
    --muted:#6f6068;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);background:var(--brand);line-height:1.65;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;
  }
  .serif{font-family:"Fraunces",Georgia,serif;font-weight:500;letter-spacing:-.01em}
  .card{
    width:100%;max-width:420px;background:var(--paper);
    border-radius:18px;padding:40px 34px;box-shadow:0 30px 80px rgba(0,0,0,.35);text-align:center;
  }
  .monogram{
    display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;
    border-radius:14px;background:var(--brand);color:var(--paper);
    font-family:"Fraunces",Georgia,serif;font-size:1.6rem;margin-bottom:18px;
  }
  h1{font-size:1.55rem;margin-bottom:6px;line-height:1.1}
  .sub{color:var(--muted);font-size:.95rem;margin-bottom:24px}
  input{
    width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:10px;
    font-size:1rem;font-family:inherit;margin-bottom:14px;
  }
  input:focus{outline:2px solid var(--brand-soft);border-color:transparent}
  button{
    width:100%;padding:13px 15px;border:0;border-radius:10px;cursor:pointer;
    background:var(--brand);color:var(--paper);font-size:1rem;font-weight:600;font-family:inherit;
    transition:background .2s ease;
  }
  button:hover{background:var(--brand-soft)}
  .err{color:#b00020;font-size:.9rem;margin-top:12px;min-height:1.1em}
</style>
</head>
<body>
  <main class="card">
    <span class="monogram">S</span>
    <h1 class="serif">Beboerforeningen<br>Skodsborg Sundpark</h1>
    <p class="sub">Indtast adgangskoden for at få adgang til siden.</p>
    <form id="login-form" autocomplete="off">
      <input type="password" id="pass" placeholder="Adgangskode" aria-label="Adgangskode" required autofocus>
      <button type="submit">Log ind</button>
      <div class="err" id="err" role="alert"></div>
    </form>
  </main>
<script>
  (function(){
    var PASSWORD = "2026Testing";
    var pass = document.getElementById("pass");
    document.getElementById("login-form").addEventListener("submit", function(ev){
      ev.preventDefault();
      if (pass.value === PASSWORD) {
        sessionStorage.setItem("ssp-auth", "ok");
        location.replace("hjem.html");
      } else {
        document.getElementById("err").textContent = "Forkert adgangskode. Prøv igen.";
        pass.value = "";
        pass.focus();
      }
    });
  })();
</script>
</body>
</html>
